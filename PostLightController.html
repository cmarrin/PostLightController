<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Post Light Controller</title>
    <style>
        :root {
            --primary-color: #007bff;
            --primary-color-hover: #0056b3;
            --danger-color: #c22;
            --danger-color-hover: #800;
            --bg-color: #ccc;
            --text-color: #212529;
            --card-bg: #ddd;
            --border-color: #dee2e6;
            --border-radius: 8px;
            --box-shadow: 0 4px 8px rgba(0, 0, 0, 0.05);
            --transition-speed: 0.3s;
        }

        /* Dark mode */
        @media (prefers-color-scheme: dark) {
            :root {
                --primary-color: #007bff;
                --primary-color-hover: #0056b3;
                --primary-color-disabled: #606060;
                --bg-color: #1a1a1a;
                --text-color: #ffffff;
                --card-bg: #2a2a2a;
                --border-color: #dee2e6;
                --border-radius: 8px;
                --box-shadow: 0 4px 8px rgba(0, 0, 0, 0.05);
                --transition-speed: 0.3s;
            }
        }
        
        a:link      { color: var(--primary-color); }
        a:visited   { color: var(--primary-color); }
        a:hover     { color: var(--primary-color-hover); }
        a:active    { color: var(--primary-color); }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            min-height: 100vh;
            margin: 0;
            padding: 1rem;
            overflow:hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            box-sizing: border-box;
        }

        .container {
            height: 500px;
            width: 100%;
            max-width: 420px;
            padding: 2rem;
            background-color: var(--card-bg);
            border-radius: var(--border-radius);
            box-shadow: var(--box-shadow);
            text-align: center;
            transition: box-shadow var(--transition-speed);
        }

        .container:hover {
             box-shadow: 0 6px 12px rgba(0, 0, 0, 0.1);
        }
        
        h1 {
            color: var(--primary-color);
            margin-top: 0;
            margin-bottom: 1rem;
            font-weight: 600;
        }

        .widget {
            background-color: var(--bg-color);
            border-radius: 8px;
            vertical-align: baseline;
            margin:10px;
            padding: 10px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            text-align: center;
            align-items: center;
            display: flex;
            margin:10px;
            justify-content: center;
       }
        .power-button {
        }
        .widget-label {
            padding:10px;
        }
        .widget-control {
            height: 34px;
        }
        .color-picker {
        }
        p {
            margin: 5px 0;
            font-size: 16px;
        }

        .switch {
            position: relative;
            width: 60px;
        }

        /* Hide default HTML checkbox */
        .switch input {
          opacity: 0;
          width: 0;
          height: 0;
        }

        /* The slider */
        .slider {
          position: absolute;
          cursor: pointer;
          top: 0;
          left: 0;
          right: 0;
          bottom: 0;
          background-color: #ccc;
          -webkit-transition: .4s;
          transition: .4s;
        }

        .slider:before {
          position: absolute;
          content: "";
          height: 26px;
          width: 26px;
          left: 4px;
          bottom: 4px;
          background-color: white;
          -webkit-transition: .4s;
          transition: .4s;
        }

        input:checked + .slider {
          background-color: #2196F3;
        }

        input:focus + .slider {
          box-shadow: 0 0 1px #2196F3;
        }

        input:checked + .slider:before {
          -webkit-transform: translateX(26px);
          -ms-transform: translateX(26px);
          transform: translateX(26px);
        }

        /* Rounded sliders */
        .slider.round {
          border-radius: 34px;
        }

        .slider.round:before {
          border-radius: 50%;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 id="title">PostLightController</h1>
        <div class="widget power-button">
            <span class="widget-label">Post Lights On</span>
            <label class="widget-control switch">
                <input type="checkbox" id="powerInput" >
                <span class="slider round"></span>
            </label>
        </div>
        <div class="widget color-picker">
            <span class="widget-label">Color</span>
            <input class="widget-control" type="color" id="colorInput" value="#ff0000">
        </div>
    </div>
    
    <script>
        document.getElementById('powerInput').addEventListener('input', function() {
            const on = this.checked;
            console.log("power is " + (on ? "on" : "off"));
        });
        document.getElementById('colorInput').addEventListener('input', function() {
            const color = this.value;
            console.log("Color changed to " + color);
        });
    </script>
</body>
</html>
